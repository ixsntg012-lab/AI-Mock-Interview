<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>AI Mock Interview</title>
  <style>
    *{box-sizing:border-box;margin:0;padding:0}
    body{font-family:'Segoe UI',sans-serif;background:linear-gradient(135deg,#1a1a2e,#16213e,#0f3460);min-height:100vh;display:flex;align-items:center;justify-content:center;padding:20px}
    .card{background:rgba(255,255,255,0.05);backdrop-filter:blur(10px);border:1px solid rgba(255,255,255,0.1);border-radius:24px;padding:40px;width:100%;max-width:520px}
    h1{color:#fff;font-size:1.9rem;text-align:center;margin-bottom:6px}
    .sub{color:#a0aec0;text-align:center;font-size:0.9rem;margin-bottom:32px}
    .accent{color:#7c3aed}
    label{display:block;color:#cbd5e0;font-size:0.82rem;font-weight:600;margin-bottom:6px;margin-top:18px}
    input,select{width:100%;padding:12px 16px;background:rgba(255,255,255,0.08);border:1.5px solid rgba(255,255,255,0.15);border-radius:10px;color:#fff;font-size:0.95rem;outline:none;transition:border 0.2s}
    input::placeholder{color:#718096}
    input:focus,select:focus{border-color:#7c3aed}
    select option{background:#1a1a2e;color:#fff}
    button{width:100%;padding:14px;background:linear-gradient(135deg,#7c3aed,#4f46e5);color:#fff;border:none;border-radius:12px;font-size:1rem;font-weight:600;cursor:pointer;margin-top:28px;transition:opacity 0.2s}
    button:hover{opacity:0.9}
    .error{background:rgba(252,129,129,0.15);border:1px solid #fc8181;border-radius:10px;padding:12px 16px;color:#fc8181;font-size:0.85rem;margin-bottom:16px}
    .features{display:grid;grid-template-columns:1fr 1fr;gap:12px;margin-bottom:28px}
    .feat{background:rgba(255,255,255,0.04);border:1px solid rgba(255,255,255,0.08);border-radius:12px;padding:14px;text-align:center}
    .feat-icon{font-size:1.4rem;margin-bottom:4px}
    .feat-text{color:#a0aec0;font-size:0.75rem}
  </style>
</head>
<body>
<div class="card">
  <h1>🤖 AI Mock <span class="accent">Interview</span></h1>
  <p class="sub">Practice interviews with real-time AI feedback</p>

  <div class="features">
    <div class="feat"><div class="feat-icon">❓</div><div class="feat-text">5 Custom Questions</div></div>
    <div class="feat"><div class="feat-icon">📊</div><div class="feat-text">Instant Scoring</div></div>
    <div class="feat"><div class="feat-icon">💡</div><div class="feat-text">AI Feedback</div></div>
    <div class="feat"><div class="feat-icon">🏆</div><div class="feat-text">Final Report</div></div>
  </div>

  {% if error %}
  <div class="error">⚠️ {{ error }}</div>
  {% endif %}

  <form action="/start" method="POST">
    <label>Your Name</label>
    <input type="text" name="name" placeholder="e.g. Swetha" required/>

    <label>Job Role</label>
    <input type="text" name="role" placeholder="e.g. Machine Learning Engineer" required/>

    <label>Experience Level</label>
    <select name="experience">
      <option>Entry Level (0–1 years)</option>
      <option>Junior (1–3 years)</option>
      <option>Mid Level (3–5 years)</option>
      <option>Senior (5+ years)</option>
    </select>

    <button type="submit">Start Interview →</button>
  </form>
</div>
</body>
</html>
